name: Build PackEditor

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 코드 받아오기
      uses: actions/checkout@v4

    - name: Visual Studio MSBuild 설정
      uses: microsoft/setup-msbuild@v2

    - name: ATL 컴포넌트 설치
      shell: pwsh
      run: |
        $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        Write-Host "VS 경로: $vsPath"
        $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
        & $installer modify --installPath $vsPath --add Microsoft.VisualStudio.Component.VC.ATL --quiet --norestart | Out-Null
        Write-Host "ATL 설치 완료"

    - name: PackEditor 빌드
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Path "DboClient/Tool/PackEditor" -Filter "*.vcxproj" -Recurse | Select-Object -First 1
        if ($proj) {
          Write-Host "찾은 파일: $($proj.FullName)"
          msbuild $proj.FullName /p:Configuration=Release /p:Platform=Win32 /m /v:detailed
        } else {
          Write-Host "vcxproj 파일을 찾지 못했습니다"
          exit 1
        }

    - name: 결과물 업로드
      uses: actions/upload-artifact@v4
      with:
        name: PackEditor
        path: DboClient/Tool/PackEditor/**/*.exe
        retention-days: 30
